      description: |-
        ## Sobre

        As APIs do [Consultar.IO](https://consultar.io/?utm_source=docs&utm_medium=referral&utm_campaign=index) são APIs RESTful que permitem consultar e buscar informações sobre estabelecimentos, pessoas, profissionais e endereços.

        ## Autenticação

        Consulte a documentação de [Autenticação](https://docs.consultar.io/autenticacao/) para mais informações sobre o processo de autenticação.
    children:
      - name: API CNPJ
        meta:
          id: fld_624dec403be8420b89c4b6d0ed90f512
          created: 1778094871053
          modified: 1778094871053
          sortKey: -1778094869182
          description: >-
            ## Introdução


            Esta API permite consultar e buscar informações sobre empresas e
            estabelecimentos registrados no Cadastro Nacional de Pessoa Jurídica
            (CNPJ).
        children:
          - url: https://consultar.io/api/v1/cnpj/consultar
            name: Consultar CNPJ
            meta:
              id: req_227deba353b746358fa00992cbbba967
              created: 1778094871054
              modified: 1778094990666
              isPrivate: false
              description: |-
                ## Consultar CNPJ

                **(Consultar pelo CNPJ)**

                Consulta detalhes de um CNPJ específico.
              sortKey: -1778094869181
            method: GET
            parameters:
              - name: cnpj
                value: "42515236000100"
                disabled: false
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: API CPF + Data de Nascimento
        meta:
          id: fld_719db84c34464c32af8c57388ad830f7
          created: 1778094871055
          modified: 1778094871055
          sortKey: -1778094869180
          description: >-
            ## Introdução


            Esta API permite consultar informações sobre pessoas físicas
            registradas no Cadastro de Pessoas Físicas (CPF) do Brasil.


            ## Lei nº 15.211/2025 - ECA Digital


            Utilize nossos dados como parte de um fluxo robusto de verificação
            de idade. Integre nossa solução a outras soluções de autenticação e
            biometria para atender aos requisitos da Lei nº 15.211/2025,
            conhecida como "ECA Digital", que exige a verificação de idade para
            acesso a conteúdos e serviços online destinados a menores de 18
            anos.
        children:
          - url: https://consultar.io/api/v1/cpf/consultar
            name: Consultar CPF
            meta:
              id: req_2ece915c898546fcb594128ff5dadfd3
              created: 1778094871056
              modified: 1778094871056
              isPrivate: false
              description: |-
                ## Consultar CPF

                **(Consultar pelo CPF e Data de Nascimento)**

                Consulta detalhes de um CPF específico.
              sortKey: -1778094869179
            method: GET
            parameters:
              - name: cpf
                value: "87135740009"
                disabled: false
              - name: data_nascimento
                value: 1990-01-01
                disabled: false
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: API Inscrição Estadual
        meta:
          id: fld_5f232a9516374b86b7b85a684987117c
          created: 1778094871056
          modified: 1778094871056
          sortKey: -1778094869178
          description: >-
            ## Introdução


            Esta API permite consultar informações sobre Inscrições Estaduais no
            SINTEGRA. A consulta de Inscrições Estaduais é realizada pelo CNPJ
            ou CPF do contribuinte, juntamente com a UF.


            Também é possível consultar informações de Produtores Rurais pelo
            CPF.
        children:
          - url: https://consultar.io/api/v2/ie/consultar
            name: Consultar IE por UF
            meta:
              id: req_d5af1448b5fd466dafd1f3b837467c66
              created: 1778094871057
              modified: 1778094871057
              isPrivate: false
              description: |-
                ## Consultar IE por UF

                **(Consultar pelo CNPJ ou CPF)**

                Consulta detalhes de uma Inscrição Estadual específica.
              sortKey: -1778094869177
            method: GET
            parameters:
              - name: uf
                value: SP
                disabled: false
              - name: cnpj
                value: "61585865150633"
                disabled: false
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
